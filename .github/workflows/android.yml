name: Build Android APK

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        
      - name: Build ARM64 Debug
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon -PABI=arm64-v8a

      - name: Upload ARM64 APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-arm64-debug
          path: android/app/build/outputs/apk/debug/*/app-debug.apk

  build-arm32:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        
      - name: Build ARM32 Debug
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon -PABI=armeabi-v7a

      - name: Upload ARM32 APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-arm32-debug
          path: android/app/build/outputs/apk/debug/*/app-debug.apk

  build-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        
      - name: Build Release
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: android/app/build/outputs/apk/release/*/app-release.apk
